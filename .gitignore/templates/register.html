<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create Account</title>

    <!-- GOOGLE FONT -->
    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='css/register.css') }}">

</head>

<body>

<div class="register-wrapper">

    <!-- ================= HEADER ================= -->
    <div class="register-header">

        <img src="{{ url_for('static',
        filename='images/logo.png') }}"
        alt="Logo">

        <h1>Create Account</h1>

        <p>
            Join as Student or Teacher to get started
        </p>

    </div>

    <!-- ================= ACCOUNT TYPE ================= -->
    <div class="account-type">

        <button type="button"
            class="type-btn active"
            id="studentBtn"
            onclick="showStudent()">

            Student

        </button>

        <button type="button"
            class="type-btn"
            id="teacherBtn"
            onclick="showTeacher()">

            Teacher

        </button>

    </div>

    <!-- ================= STUDENT FORM ================= -->
    <form class="form-box"
          id="studentForm"
          method="POST"
          action="/create-account">

        <input type="hidden"
               name="role"
               value="Student">

        <h2>Student Account</h2>

        <div class="form-grid">

            <!-- FULL NAME -->
            <div class="input-group">

                <label>Full Name</label>

                <input type="text"
                       name="full_name"
                       placeholder="Ex: Nikhil Kumar"
                       required>

            </div>

            <!-- USERNAME -->
            <div class="input-group">

                <label>Username</label>

                <input type="text"
                       name="username"
                       placeholder="Ex: nikhil123"
                       required>

            </div>

            <!-- EMAIL -->
            <div class="input-group">

                <label>Email Address</label>

                <input type="email"
                       name="email"
                       placeholder="Ex: nikhil@gmail.com"
                       required>

            </div>

            <!-- PASSWORD -->
            <div class="input-group">

                <label>Password</label>

                <input type="password"
                name="password"
                id="password"
                placeholder="Ex: Nikhil@123"
                required

                pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$"

                title="Password must contain uppercase, lowercase, number, symbol and minimum 8 characters">

            </div>


            <!-- DOB -->
            <div class="input-group">

                <label>Date of Birth</label>

                <input type="date"
                       name="dob">

            </div>

            <!-- EDUCATION TYPE -->

            <div class="input-group">

                <label>Education Type</label>

                <select name="education_type"
                        id="educationType"
                        onchange="handleEducationType()"
                        required>

                    <option value="">Select</option>

                    <option value="BTech">BTech</option>

                    <option value="10th">10th</option>

                    <option value="12th">12th</option>

                </select>

            </div>

            <!-- =====================================
            BOARD SECTION
            ===================================== -->

            <div id="boardFields"
                class="dynamic-section hidden">

                <div class="input-group">

                    <label>Board</label>

                    <select name="board">

                        <option value="">
                            Select Board
                        </option>

                        <option value="CBSE">
                            CBSE
                        </option>

                        <option value="BSEB">
                            BSEB
                        </option>

                        <option value="ICSE">
                            ICSE
                        </option>

                        <option value="JAC">
                            JAC
                        </option>

                        <option value="UP Board">
                            UP Board
                        </option>

                    </select>

                </div>

            </div>

            <!-- =====================================
            BTECH SECTION
            ===================================== -->

            <div id="btechFields"
                class="dynamic-section hidden">

                <div class="input-group">

                    <label>Branch</label>

                    <select name="branch">

                        <option value="">
                            Select Branch
                        </option>

                        <option value="CSE">
                            Computer Science
                        </option>

                        <option value="ECE">
                            Electronics
                        </option>

                        <option value="EE">
                            Electrical
                        </option>

                        <option value="ME">
                            Mechanical
                        </option>

                        <option value="Civil">
                            Civil
                        </option>

                    </select>

                </div>

                <div class="input-group">

                    <label>Semester</label>

                    <select name="semester">

                        <option value="">
                            Select Semester
                        </option>

                        <option value="1">Semester 1</option>
                        <option value="2">Semester 2</option>
                        <option value="3">Semester 3</option>
                        <option value="4">Semester 4</option>
                        <option value="5">Semester 5</option>
                        <option value="6">Semester 6</option>
                        <option value="7">Semester 7</option>
                        <option value="8">Semester 8</option>

                    </select>

                </div>

            </div>

            <!-- =====================================
            12TH STREAM SECTION
            ===================================== -->

            <div id="streamFields"
                class="dynamic-section hidden">

                <div class="input-group">

                    <label>Stream</label>

                    <select name="stream"
                            id="streamType"
                            onchange="handleStreamType()">

                        <option value="">
                            Select Stream
                        </option>

                        <option value="Science">
                            Science
                        </option>

                        <option value="Commerce">
                            Commerce
                        </option>

                        <option value="Arts">
                            Arts
                        </option>

                    </select>

                </div>

            </div>

            <!-- =====================================
            SCIENCE GROUP
            ===================================== -->

            <div id="scienceFields"
                class="dynamic-section hidden">

                <div class="input-group">

                    <label>Science Group</label>

                    <select name="science_group">

                        <option value="">
                            Select Group
                        </option>

                        <option value="PCM">
                            PCM (Math)
                        </option>

                        <option value="PCB">
                            PCB (Biology)
                        </option>

                    </select>

                </div>

            </div>

            <!-- =====================================
            COMMERCE SECTION
            ===================================== -->

            <div id="commerceFields"
                class="dynamic-section hidden">

                <div class="input-group">

                    <label>Commerce Focus</label>

                    <select name="commerce_focus">

                        <option value="">
                            Select Focus
                        </option>

                        <option value="Accounts">
                            Accounts
                        </option>

                        <option value="Business Studies">
                            Business Studies
                        </option>

                        <option value="Economics">
                            Economics
                        </option>

                    </select>

                </div>

            </div>

            <!-- =====================================
            ARTS SECTION
            ===================================== -->

            <div id="artsFields"
                class="dynamic-section hidden">

                <div class="input-group">

                    <label>Arts Specialization</label>

                    <select name="arts_focus">

                        <option value="">
                            Select Subject
                        </option>

                        <option value="History">
                            History
                        </option>

                        <option value="Political Science">
                            Political Science
                        </option>

                        <option value="Geography">
                            Geography
                        </option>

                        <option value="Psychology">
                            Psychology
                        </option>

                    </select>

                </div>

            </div>

            <!-- BTECH SECTION -->

            <div id="btechFields"
                class="dynamic-section hidden">

                <div class="input-group">

                    <label>Branch</label>

                    <select name="branch">

                        <option value="">Select Branch</option>

                        <option value="CSE">CSE</option>

                        <option value="ECE">ECE</option>

                        <option value="EE">EE</option>

                        <option value="ME">ME</option>

                        <option value="Civil">Civil</option>

                    </select>

                </div>

                <div class="input-group">

                    <label>Semester</label>

                    <select name="semester">

                        <option value="">Select Semester</option>

                        <option value="1">Semester 1</option>

                        <option value="2">Semester 2</option>

                        <option value="3">Semester 3</option>

                        <option value="4">Semester 4</option>

                        <option value="5">Semester 5</option>

                        <option value="6">Semester 6</option>

                        <option value="7">Semester 7</option>

                        <option value="8">Semester 8</option>

                    </select>

                </div>

            </div>

            <!-- 12TH SECTION -->

            <div id="streamFields"
                class="dynamic-section hidden">

                <div class="input-group full-width">

                    <label>Stream</label>

                    <select name="stream">

                        <option value="">Select Stream</option>

                        <option value="Science">Science</option>

                        <option value="Commerce">Commerce</option>

                        <option value="Arts">Arts</option>

                    </select>

                </div>

            </div>

            <!-- SCHOOL -->
            <div class="input-group full-width">

                <label>School Name</label>

                <input type="text"
                       name="school_name"
                       placeholder="Ex: Delhi Public School">

            </div>

        </div>

        <!-- BUTTON -->
        <button type="submit">

            Create Student Account

        </button>

    </form>

    <!-- ================= TEACHER FORM ================= -->
    <form class="form-box hidden"
          id="teacherForm"
          method="POST"
          action="/create-account">

        <input type="hidden"
               name="role"
               value="Teacher">

        <h2 class="teacher-title">

            Teacher Account

        </h2>

        <div class="form-grid">

            <!-- FULL NAME -->
            <div class="input-group">

                <label>Full Name</label>

                <input type="text"
                       name="full_name"
                       placeholder="Ex: Rahul Sharma"
                       required>

            </div>

            <!-- USERNAME -->
            <div class="input-group">

                <label>Username</label>

                <input type="text"
                       name="username"
                       placeholder="Ex: rahul_teacher"
                       required>

            </div>

            <!-- EMAIL -->
            <div class="input-group">

                <label>Email Address</label>

                <input type="email"
                       name="email"
                       placeholder="Ex: rahul@gmail.com"
                       required>

            </div>

            <!-- PASSWORD -->
            <div class="input-group">

                <label>Password</label>

                <input type="password"
                    name="password"
                    placeholder="Enter strong password"
                    required

                    pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$"

                    title="Password must contain uppercase, lowercase, number, symbol and minimum 8 characters">

            </div>

            <!-- DEPARTMENT -->
            <div class="input-group">

                <label>Department</label>

                <input type="text"
                       name="department"
                       placeholder="Ex: Computer Science">

            </div>

            <!-- PHONE -->
            <div class="input-group">

                <label>Phone Number</label>

                <input type="text"
                       name="phone"
                       placeholder="Ex: +91 9876543210">

            </div>

            <!-- SCHOOL -->
            <div class="input-group full-width">

                <label>School / Institute</label>

                <input type="text"
                       name="school_name"
                       placeholder="Ex: ABC Public School">

            </div>

        </div>

        <!-- BUTTON -->
        <button type="submit"
                class="teacher-btn">

            Create Teacher Account

        </button>

    </form>

    <!-- ================= BACK LOGIN ================= -->
    <div class="back-login">

        <a href="/">

            ← Back to Login

        </a>

    </div>

</div>

<!-- ================= JAVASCRIPT ================= -->
<script>

function showStudent(){

    document.getElementById("studentForm")
    .classList.remove("hidden");

    document.getElementById("teacherForm")
    .classList.add("hidden");

    document.getElementById("studentBtn")
    .classList.add("active");

    document.getElementById("teacherBtn")
    .classList.remove("active");
}

function showTeacher(){

    document.getElementById("teacherForm")
    .classList.remove("hidden");

    document.getElementById("studentForm")
    .classList.add("hidden");

    document.getElementById("teacherBtn")
    .classList.add("active");

    document.getElementById("studentBtn")
    .classList.remove("active");
}

/* =====================================
EDUCATION TYPE
===================================== */

function handleEducationType(){

    const type =
    document.getElementById("educationType").value;

    // SECTIONS

    const boardFields =
    document.getElementById("boardFields");

    const btechFields =
    document.getElementById("btechFields");

    const streamFields =
    document.getElementById("streamFields");

    // HIDE ALL

    boardFields.classList.add("hidden");

    btechFields.classList.add("hidden");

    streamFields.classList.add("hidden");

    // EXTRA HIDE

    hideAllStreams();

    // =====================================
    // BTECH
    // =====================================

    if(type === "BTech"){

        btechFields.classList.remove("hidden");
    }

    // =====================================
    // 10TH
    // =====================================

    else if(type === "10th"){

        boardFields.classList.remove("hidden");
    }

    // =====================================
    // 12TH
    // =====================================

    else if(type === "12th"){

        boardFields.classList.remove("hidden");

        streamFields.classList.remove("hidden");
    }
}

/* =====================================
STREAM TYPE
===================================== */

function handleStreamType(){

    const stream =
    document.getElementById("streamType").value;

    hideAllStreams();

    // SCIENCE

    if(stream === "Science"){

        document.getElementById("scienceFields")
        .classList.remove("hidden");
    }

    // COMMERCE

    else if(stream === "Commerce"){

        document.getElementById("commerceFields")
        .classList.remove("hidden");
    }

    // ARTS

    else if(stream === "Arts"){

        document.getElementById("artsFields")
        .classList.remove("hidden");
    }
}

/* =====================================
HIDE STREAMS
===================================== */

function hideAllStreams(){

    document.getElementById("scienceFields")
    .classList.add("hidden");

    document.getElementById("commerceFields")
    .classList.add("hidden");

    document.getElementById("artsFields")
    .classList.add("hidden");
}

</script>

</body>
</html>
