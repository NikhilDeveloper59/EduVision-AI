<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Give Feedback</title>

    <link rel="stylesheet"
    href="{{ url_for('static',
    filename='css/give_feedback.css') }}">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <!-- OVERLAY -->

    <div class="feedback-overlay active"
    id="feedbackOverlay">

        <!-- MODAL -->

        <div class="feedback-modal">

            <!-- CLOSE -->

            <button class="close-feedback"
            onclick="closeFeedbackModal()">

                <i class="fa-solid fa-xmark"></i>

            </button>

            <!-- HEADER -->

            <div class="feedback-header">

                <h1>

                    We value your feedback

                </h1>

                <p>

                    Help us improve Student Prediction
                    by sharing your thoughts.

                </p>

            </div>

            <!-- TYPES -->

            <div class="feedback-types">

                <div class="feedback-card active">

                    <i class="fa-regular fa-message"></i>

                    <h3>Suggestion</h3>

                    <p>I have an idea to improve</p>

                </div>

                <div class="feedback-card">

                    <i class="fa-solid fa-triangle-exclamation"></i>

                    <h3>Problem</h3>

                    <p>Something is not working</p>

                </div>

                <div class="feedback-card">

                    <i class="fa-regular fa-thumbs-up"></i>

                    <h3>Compliment</h3>

                    <p>I want to appreciate something</p>

                </div>

                <div class="feedback-card">

                    <i class="fa-solid fa-ellipsis"></i>

                    <h3>Other</h3>

                    <p>Other feedback or comments</p>

                </div>

            </div>

            <!-- FORM -->

            <form class="feedback-form" action="/send-feedback" method="POST">

                <label>

                    Your Feedback

                </label>

                <input type="hidden" name="feedback_type" id="feedbackType" value="Suggestion">

                <textarea

                name="feedback"

                placeholder="Tell us what you think..."

                required

            ></textarea>

                <!-- FOOTER -->

                <div class="feedback-footer">

                    <div class="feedback-note">

                        <i class="fa-solid fa-lock"></i>

                        Your feedback helps us improve.

                    </div>

                    <div class="feedback-actions">

                        <button type="button"
                        class="cancel-btn"
                        onclick="closeFeedbackModal()">

                            Cancel

                        </button>

                        <button type="submit"
                        class="submit-btn">

                            <i class="fa-regular fa-paper-plane"></i>

                            Submit Feedback

                        </button>

                    </div>

                </div>

            </form>

        </div>

    </div>


<script>

    // =======================================
// CLOSE MODAL
// =======================================

function closeFeedbackModal(){

    window.location.href = "/help_support";
}

// =======================================
// SELECT CARD
// =======================================
document.querySelectorAll(
    ".feedback-card"
).forEach(card=>{

    card.addEventListener("click",()=>{

        document.querySelectorAll(
            ".feedback-card"
        ).forEach(c=>{

            c.classList.remove("active");
        });

        card.classList.add("active");

        // SAVE TYPE
        document.getElementById(
            "feedbackType"
        ).value =
        card.querySelector("h3").innerText;

    });
});

// =======================================
// SYNC DASHBOARD THEME
// =======================================

document.addEventListener(
    "DOMContentLoaded",
    function(){

        const savedTheme =
        localStorage.getItem("theme");

        if(savedTheme === "light"){

            document.body.classList.add(
                "light-mode"
            );
        }
    }
);
</script>

</body>
</html>
