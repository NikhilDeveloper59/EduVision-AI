<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>OTP Verification</title>

<!-- GOOGLE FONT -->
<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet"
href="{{ url_for('static',
filename='css/otp.css') }}">

</head>

<body>

<div class="otp-container">

    <!-- LEFT SIDE -->
    <div class="otp-left">

        <img src="{{ url_for('static',
        filename='images/otp.png') }}"
        alt="OTP">

        <h2>Secure Verification</h2>

        <p>

            We have sent a 6-digit verification code
            to your registered email address.

        </p>

    </div>

    <!-- RIGHT SIDE -->
    <div class="otp-right">

        <div class="otp-logo">

            <img src="{{ url_for('static',
            filename='images/logo.png') }}">

        </div>

        <h1>OTP Verification</h1>

        <p class="subtitle">

            Enter the verification code sent to your email

        </p>

        <!-- OTP FORM -->
        <form method="POST"
        action="/check-otp">

        <div class="input-group">

            <label>Verification Code</label>

            <input type="text"
                name="otp"
                maxlength="6"
                placeholder="Ex: 483921"
                required>

        </div>

        <!-- TIMER -->
        <div class="otp-timer">

            OTP expires in
            <span id="timer">

                02:00

            </span>

        </div>

        <!-- VERIFY BUTTON -->
        <button type="submit"
                class="verify-btn">

            Verify OTP

        </button>

    </form>

        <!-- RESEND -->
        <div class="resend-section">

            <p>
                Didn’t receive the OTP?
            </p>

            <!-- RESEND BUTTON -->
            <button class="retry-btn"
            id="resendBtn"
            onclick="resendOTP(event)">

                Retry / Resend OTP

            </button>

        </div>

        <!-- BACK -->
        <div class="back-login">

            <a href="/">

                ← Back to Login

            </a>

        </div>

    </div>

</div>


<script>

/* =========================
   TIMER VARIABLES
========================= */

let timeLeft = 120;

const timer =
document.getElementById("timer");

let countdown;


/* =========================
   START TIMER FUNCTION
========================= */

function startTimer(){

    // CLEAR OLD TIMER
    clearInterval(countdown);

    timeLeft = 120;

    timer.style.color = "#1f64ff";

    countdown = setInterval(() => {

        let minutes =
        Math.floor(timeLeft / 60);

        let seconds =
        timeLeft % 60;

        seconds =
        seconds < 10
        ? "0" + seconds
        : seconds;

        timer.innerHTML =
        `${minutes}:${seconds}`;

        // STOP TIMER
        if(timeLeft <= 0){

            clearInterval(countdown);

            timer.innerHTML = "Expired";

            timer.style.color = "red";

            return;
        }

        timeLeft--;

    },1000);

}


/* =========================
   START TIMER ON LOAD
========================= */

startTimer();


/* =========================
   RESEND OTP
========================= */

function resendOTP(event){

    event.preventDefault();

    fetch("/resend-otp",{

        method:"POST"

    })

    .then(response => response.json())

    .then(data => {

        alert(data.message);

        // RESTART TIMER
        startTimer();

    })

    .catch(error => {

        console.log(error);

        alert("Failed to resend OTP");

    });

}

</script>

</body>
</html>
