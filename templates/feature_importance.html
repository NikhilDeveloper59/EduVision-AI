<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>

        Feature Importance

    </title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/feature_importance.css') }}">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="feature-wrapper">

    <!-- ================================================= -->
    <!-- HEADER -->
    <!-- ================================================= -->

    <div class="top-bar">

        <div>

            <h1>

                🔍 Explainable AI Dashboard

            </h1>

            <p>

                Understand how the AI model predicts student performance

            </p>

        </div>

        <button class="back-btn"
        onclick="window.location.href='/dashboard'">

            ← Back Dashboard

        </button>

    </div>

    <!-- ================================================= -->
    <!-- FEATURE GRAPH -->
    <!-- ================================================= -->

    <div class="feature-card">

        <div class="card-header">

            <h2>

                📊 Top Important Features

            </h2>

        </div>

        <div class="chart-box">

            <canvas id="featureChart"></canvas>

        </div>

    </div>

    <!-- ================================================= -->
    <!-- AI EXPLANATION -->
    <!-- ================================================= -->

    <div class="feature-card">

        <div class="card-header">

            <h2>

                🧠 AI Explanation

            </h2>

        </div>

        <div class="info-box">

            The AI model analyzes academic and behavioral factors
            to predict student performance accurately.

        </div>

        <!-- SHAP STYLE -->

        <div class="shap-grid">

            {% for item in shap_explanations %}

            <div class="shap-box">

                <div class="shap-icon">

                    ✨

                </div>

                <div class="shap-text">

                    {{ item }}

                </div>

            </div>

            {% endfor %}

        </div>

    </div>

</div>

<!-- ===================================================== -->
<!-- JAVASCRIPT -->
<!-- ===================================================== -->

<script>

/* ===================================================== */
/* DARK LIGHT MODE */
/* ===================================================== */

const savedTheme = localStorage.getItem(
    "theme"
);

if(savedTheme === "light"){

    document.body.classList.add(
        "light-mode"
    );
}

/* ===================================================== */
/* COLORS */
/* ===================================================== */

const darkMode = !document.body.classList.contains(
    'light-mode'
);

const textColor = darkMode
? '#ffffff'
: '#111827';

const gridColor = darkMode
? 'rgba(255,255,255,0.08)'
: 'rgba(0,0,0,0.08)';

/* ===================================================== */
/* FLASK DATA */
/* ===================================================== */

const featureLabels = JSON.parse(

    '{{ features | tojson | safe }}'

);

const featureValues = JSON.parse(

    '{{ importances | tojson | safe }}'

);

/* ===================================================== */
/* FEATURE IMPORTANCE CHART */
/* ===================================================== */

new Chart(

    document.getElementById(
        'featureChart'
    ),

    {

        type:'bar',

        data:{

            labels:featureLabels,

            datasets:[{

                label:'Importance Score',

                data:featureValues,

                backgroundColor:[

                    '#2563eb',
                    '#3b82f6',
                    '#60a5fa',
                    '#8b5cf6',
                    '#22c55e',
                    '#f59e0b',
                    '#ef4444',
                    '#14b8a6',
                    '#f97316',
                    '#6366f1'

                ],

                borderRadius:12

            }]

        },

        options:{

            indexAxis:'y',

            responsive:true,

            maintainAspectRatio:false,

            plugins:{

                legend:{

                    labels:{

                        color:textColor

                    }

                }

            },

            scales:{

                x:{

                    ticks:{

                        color:textColor

                    },

                    grid:{

                        color:gridColor

                    }

                },

                y:{

                    ticks:{

                        color:textColor

                    },

                    grid:{

                        color:gridColor

                    }

                }

            }

        }

    }

);

</script>

</body>
</html>
